services:
  mysql:
    image: mysql:8.0
    container_name: khringproj-mysql-1
    command: --default-authentication-plugin=mysql_native_password --bind-address=0.0.0.0 --max_allowed_packet=64M --wait_timeout=28800
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_MAX_ALLOWED_PACKET: 64M
      MYSQL_WAIT_TIMEOUT: 28800
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - khringproj_network
    restart: unless-stopped

  php:
    image: php:8.2-fpm
    container_name: khringproj-php-1
    volumes:
      - ./:/var/www/html
    networks:
      - khringproj_network
    restart: unless-stopped
    depends_on:
      - mysql
    command: >
      sh -c "docker-php-ext-install fileinfo && docker-php-ext-enable fileinfo && php-fpm"
    environment:
      PHP_UPLOAD_MAX_FILESIZE: 64M
      PHP_POST_MAX_SIZE: 64M
    # Optionally mount a custom php.ini if you want to override settings
    # Uncomment the following lines if you have a php.ini in your project root
    #volumes:
    #  - ./php.ini:/usr/local/etc/php/php.ini

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: khringproj-phpmyadmin-1
    environment:
      PMA_HOST: mysql
      PMA_USER: ${MYSQL_USER}
      PMA_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"
    depends_on:
      - mysql
    networks:
      - khringproj_network
    restart: unless-stopped

volumes:
  mysql_data:


networks:
  khringproj_network:
    driver: bridge
